{% load static %}

<div class="row g-3 mb-4">
  {% for stat in stats %}
  <div class="col-md-3">
    <div class="card border-0 shadow-sm">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="d-flex align-items-center justify-content-center rounded-3 {{ stat.color }} bg-opacity-10 text-{{ stat.color|cut:"bg-" }}" style="width:48px;height:48px;">
          <i class="bi {{ stat.icon }} fs-4"></i>
        </div>
        <div>
          <h3 class="mb-0 fw-bold">{{ stat.value }}</h3>
          <span class="text-muted small">{{ stat.label }}</span>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
