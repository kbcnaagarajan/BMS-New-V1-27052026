{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm text-center">
        <div class="card-body py-5">
          <i class="bi bi-exclamation-triangle fs-1 text-danger mb-3 d-block"></i>
          <h5 class="fw-bold">Confirm Delete</h5>
          <p class="text-muted mb-4">Are you sure you want to delete "<strong>{{ object }}</strong>"? This action cannot be undone.</p>
          <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-2">
              <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i> Delete</button>
              <a href="{% url cancel_url %}" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
