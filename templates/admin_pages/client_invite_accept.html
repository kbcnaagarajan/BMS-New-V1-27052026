{% extends "base.html" %}
{% block page_title %}Accept Client Invite{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="logo">
      <h3>Client Portal Invite</h3>
      <p>You've been invited to access <strong>{{ invite.client.name }}</strong></p>
    </div>
    {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" value="{{ invite.email }}" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" value="{{ invite.first_name }} {{ invite.last_name }}" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Set Password & Continue</button>
    </form>
  </div>
</div>
{% endblock %}
