{% extends "base.html" %}
{% block page_title %}Client Invite Expired{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card text-center">
    <div class="logo">
      <h3>Invite Expired</h3>
      <p class="text-muted">This client invite for <strong>{{ invite.email }}</strong> has expired.</p>
      <p class="text-muted small">Please contact your company admin to resend a new invite.</p>
      <a href="{% url 'login' %}" class="btn btn-primary mt-2">Go to Login</a>
    </div>
  </div>
</div>
{% endblock %}
