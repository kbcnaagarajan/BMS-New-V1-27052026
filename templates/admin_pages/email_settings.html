{% extends "base.html" %}
{% block page_title %}Email Settings{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white">
      <h5 class="mb-0"><i class="bi bi-envelope-gear me-2"></i>Email Settings - {{ settings_scope_label }}</h5>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Backend</label>
            <input type="text" class="form-control" name="backend" value="{{ email_cfg.backend }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">SMTP Host</label>
            <input type="text" class="form-control" name="host" value="{{ email_cfg.host }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Port</label>
            <input type="number" class="form-control" name="port" value="{{ email_cfg.port }}">
          </div>
          <div class="col-md-5">
            <label class="form-label">Host User (Email)</label>
            <input type="text" class="form-control" name="host_user" value="{{ email_cfg.host_user }}">
          </div>
          <div class="col-md-4">
            <label class="form-label">Host Password / App Password</label>
            <input type="password" class="form-control" name="host_password" value="{{ email_cfg.host_password }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Default From Email</label>
            <input type="email" class="form-control" name="default_from_email" value="{{ email_cfg.default_from_email }}">
          </div>
          <div class="col-md-6 d-flex gap-4 align-items-end">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="use_tls" id="id_use_tls" {% if email_cfg.use_tls %}checked{% endif %}>
              <label class="form-check-label" for="id_use_tls">Use TLS</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="use_ssl" id="id_use_ssl" {% if email_cfg.use_ssl %}checked{% endif %}>
              <label class="form-check-label" for="id_use_ssl">Use SSL</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="is_active" id="id_is_active" {% if email_cfg.is_active %}checked{% endif %}>
              <label class="form-check-label" for="id_is_active">Active</label>
            </div>
          </div>
        </div>
        <div class="mt-4">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Email Settings</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
