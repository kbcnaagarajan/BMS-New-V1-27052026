{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <a href="{% url module_key|add:'_list' %}" class="btn btn-outline-secondary btn-sm me-2"><i class="bi bi-arrow-left"></i> Back</a>
      <h4 class="fw-bold mb-0 d-inline">{{ page_title }}</h4>
    </div>
    <div>
      <a href="{% url module_key|add:'_edit' object.pk %}" class="btn btn-primary btn-sm"><i class="bi bi-pencil"></i> Edit</a>
      <a href="{% url module_key|add:'_delete' object.pk %}" class="btn btn-danger btn-sm"><i class="bi bi-trash"></i> Delete</a>
    </div>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <div class="row g-3">
        {% for fv in field_values %}
        <div class="col-md-6">
          <div class="detail-label">{{ fv.label }}</div>
          <div class="detail-value">{{ fv.value }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
