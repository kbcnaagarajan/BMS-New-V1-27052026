{% extends "base.html" %}
{% load static %}

{% block page_title %}{% if edit %}Edit Task{% else %}Add Task{% endif %}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">{% if edit %}Edit Task{% else %}Add Task{% endif %}</h4>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="id_title" class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" name="title" id="id_title" class="form-control" value="{{ task.title|default:'' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="id_project" class="form-label">Project <span class="text-danger">*</span></label>
                        <select name="project" id="id_project" class="form-select" required>
                            <option value="">---------</option>
                            {% for p in projects %}
                            <option value="{{ p.pk }}" {% if task.project_id == p.pk %}selected{% endif %}>{{ p }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <label for="id_description" class="form-label">Description</label>
                        <textarea name="description" id="id_description" class="form-control" rows="3">{{ task.description|default:'' }}</textarea>
                    </div>
                    <div class="col-md-4">
                        <label for="id_assigned_to" class="form-label">Assigned To</label>
                        <select name="assigned_to" id="id_assigned_to" class="form-select">
                            <option value="">---------</option>
                            {% for u in assignees %}
                            <option value="{{ u.pk }}" {% if task.assigned_to_id == u.pk %}selected{% endif %}>{{ u.get_full_name|default:u.email }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="id_start_date" class="form-label">Start Date</label>
                        <input type="date" name="start_date" id="id_start_date" class="form-control" value="{{ task.start_date|date:'Y-m-d'|default:'' }}">
                    </div>
                    <div class="col-md-4">
                        <label for="id_due_date" class="form-label">Due Date</label>
                        <input type="date" name="due_date" id="id_due_date" class="form-control" value="{{ task.due_date|date:'Y-m-d'|default:'' }}">
                    </div>
                    <div class="col-md-4">
                        <label for="id_priority" class="form-label">Priority</label>
                        <select name="priority" id="id_priority" class="form-select">
                            <option value="low" {% if task.priority == "low" %}selected{% endif %}>Low</option>
                            <option value="medium" {% if task.priority == "medium" or not task %}selected{% endif %}>Medium</option>
                            <option value="high" {% if task.priority == "high" %}selected{% endif %}>High</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="id_status" class="form-label">Status</label>
                        <select name="status" id="id_status" class="form-select">
                            <option value="todo" {% if task.status == "todo" or not task %}selected{% endif %}>Not Started</option>
                            <option value="in_progress" {% if task.status == "in_progress" %}selected{% endif %}>In Progress</option>
                            <option value="done" {% if task.status == "done" %}selected{% endif %}>Completed</option>
                            <option value="on_hold" {% if task.status == "on_hold" %}selected{% endif %}>On Hold</option>
                            <option value="cancelled" {% if task.status == "cancelled" %}selected{% endif %}>Cancelled</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="id_progress" class="form-label">Progress (%)</label>
                        <input type="number" name="progress" id="id_progress" class="form-control" min="0" max="100" value="{{ task.progress_percentage|default:'0' }}">
                    </div>
                </div>
                <div class="d-flex justify-content-end mt-4 gap-2">
                    <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
